<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="See your public IP address and geolocation details at a glance.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="css/main.css">
    <title>IP Info — Your IP</title>
</head>
<body>
    <main class="app">
        <nav class="tabs">
            <a class="tab is-active" href="index.html">Your IP</a>
            <a class="tab" href="other-ip.html">Look up an IP</a>
        </nav>

        <section class="card" id="your-ip" aria-busy="true">
            <header class="card__header">
                <h1>Your IP Info</h1>
                <p class="card__subtitle">A live snapshot of your public IP address.</p>
            </header>

            <div class="status" id="status" role="status">
                <span class="spinner" aria-hidden="true"></span>
                <span>Detecting your IP…</span>
            </div>

            <dl class="details" id="details" hidden>
                <div class="detail detail--ip">
                    <dt>IP Address</dt>
                    <dd>
                        <span id="ip"></span>
                        <button class="copy" id="copy-ip" type="button" title="Copy IP" aria-label="Copy IP">Copy</button>
                    </dd>
                </div>
                <div class="detail"><dt>Country</dt><dd><span id="flag"></span> <span id="country"></span></dd></div>
                <div class="detail"><dt>City</dt><dd id="city"></dd></div>
                <div class="detail"><dt>Continent</dt><dd id="continent"></dd></div>
                <div class="detail"><dt>Currency</dt><dd id="currency"></dd></div>
                <div class="detail"><dt>Timezone</dt><dd id="timezone"></dd></div>
                <div class="detail"><dt>ISP</dt><dd id="isp"></dd></div>
            </dl>

            <button class="btn btn--ghost" id="retry" type="button" hidden>Try again</button>
        </section>

        <footer class="foot">Data via <a href="https://ipwho.is" target="_blank" rel="noopener">ipwho.is</a></footer>
    </main>

    <script src="js/api.js"></script>
    <script src="js/index.js"></script>
</body>
</html>
